site_name: torchmorph
site_url: https://intcomp.org/tm/docs/
site_description: GPU-accelerated morphological operations for PyTorch
repo_url: https://github.com/intcomp/torchmorph
repo_name: intcomp/torchmorph

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - API Reference:
      - Distance Transforms: api/distance_transforms.md
      - Morphological Operations: api/morphological_ops.md
