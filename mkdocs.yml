site_name: torchmorph
site_url: https://intcomp.github.io/tm/
site_description: GPU-accelerated morphological operations for PyTorch
repo_url: https://github.com/intcomp/torchmorph
repo_name: intcomp/torchmorph

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 3
            show_symbol_type_heading: true
            merge_init_into_class: true
            separate_signature: true
            line_length: 88

markdown_extensions:
  - toc:
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - API Reference:
      - Distance Transforms: api/distance_transforms.md
      - Structuring Elements: api/structuring_elements.md
      - Binary Morphology: api/binary_morphology.md
      - Grayscale Morphology: api/grayscale_morphology.md
      - Optimal Transport: api/optimal_transport.md
