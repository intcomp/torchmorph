name: test

on:
    pull_request:
      branches: ["*"]
    push:
        branches: [main]

permissions:
    contents: read
    pull-requests: read

test:
    runs-on: self-hosted
    steps:
        - uses: actions/checkout@v4
        - run: |
            pip install -r requirements-dev.txt --break-system-packages --user
            pip uninstall torchmorph --yes
            python setup.py install --user
        - run: |
            ORIGINAL=$(pwd)
            cd /tmp
            pytest $ORIGINAL/test